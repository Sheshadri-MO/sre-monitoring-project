---
- name: Configure Monitoring Server
  hosts: monitoring
  become: yes

  tasks:

  - name: Update apt
    apt:
      update_cache: yes

  - name: Install dependencies
    apt:
      name:
        - apt-transport-https
        - software-properties-common
        - wget
      state: present

  - name: Add Grafana GPG key
    shell: wget -q -O - https://packages.grafana.com/gpg.key | apt-key add -

  - name: Add Grafana repository
    apt_repository:
      repo: "deb https://packages.grafana.com/oss/deb stable main"
      state: present

  - name: Update apt again
    apt:
      update_cache: yes

  - name: Install Grafana
    apt:
      name: grafana
      state: present

  - name: Start Grafana
    service:
      name: grafana-server
      state: started
      enabled: yes

  - name: Install Prometheus
    apt:
      name: prometheus
      state: present

  - name: Start Prometheus
    service:
      name: prometheus
      state: started
      enabled: yes
